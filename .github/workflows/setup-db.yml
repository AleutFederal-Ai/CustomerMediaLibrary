name: Setup Database (one-time)

on:
  workflow_dispatch:

jobs:
  setup:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20.x"
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Login to Azure Government
        uses: azure/login@v2
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS }}
          environment: AzureUSGovernment

      - name: Grant Cosmos DB data plane role to service principal
        uses: azure/cli@v2
        with:
          azcliversion: latest
          inlineScript: |
            az cloud set --name AzureUSGovernment

            # Get the object ID of the logged-in service principal
            SP_OBJECT_ID=$(az ad sp show --id $(az account show --query user.name -o tsv) --query id -o tsv)
            echo "Service principal object ID: $SP_OBJECT_ID"

            # Assign Cosmos DB Built-in Data Contributor (data plane role — not visible in portal IAM)
            # Role definition ID 00000000-0000-0000-0000-000000000002 is the built-in data contributor
            az cosmosdb sql role assignment create \
              --account-name mymedia-cosmos \
              --resource-group rg-mymedia-prod \
              --role-definition-id "00000000-0000-0000-0000-000000000002" \
              --principal-id "$SP_OBJECT_ID" \
              --scope "/subscriptions/b2fba6de-c97e-42f2-b4f4-86cfa84a6de0/resourceGroups/rg-mymedia-prod/providers/Microsoft.DocumentDB/databaseAccounts/mymedia-cosmos" \
              && echo "Role assigned." || echo "Role assignment skipped (may already exist)."

      - name: Run production setup script
        run: npx tsx scripts/setup-prod.ts
        env:
          # AzureCLICredential (part of DefaultAzureCredential) picks up the
          # az login session established by azure/login above.
          AZURE_CLOUD: AzureUSGovernment
