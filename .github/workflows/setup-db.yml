name: Setup Database (one-time)

on:
  workflow_dispatch:

jobs:
  setup:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20.x"
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Login to Azure Government
        uses: azure/login@v2
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS }}
          environment: AzureUSGovernment

      - name: Grant Cosmos DB data plane role to service principal
        uses: azure/cli@v2
        with:
          azcliversion: latest
          inlineScript: |
            az cloud set --name AzureUSGovernment

            # Get the client ID (app ID) of the logged-in service principal
            APP_ID=$(az account show --query user.name -o tsv)
            echo "App ID: $APP_ID"

            # Get the object ID from the app ID
            SP_OBJECT_ID=$(az ad sp show --id "$APP_ID" --query id -o tsv)
            if [ -z "$SP_OBJECT_ID" ]; then
              echo "ERROR: Could not resolve service principal object ID for app $APP_ID"
              exit 1
            fi
            echo "Service principal object ID: $SP_OBJECT_ID"

            # Check if role assignment already exists
            EXISTING=$(az cosmosdb sql role assignment list \
              --account-name mymedia-cosmos \
              --resource-group rg-mymedia-prod \
              --query "[?principalId=='$SP_OBJECT_ID'] | length(@)" -o tsv)
            echo "Existing Cosmos DB role assignments for this principal: $EXISTING"

            if [ "$EXISTING" -gt "0" ]; then
              echo "Role already assigned — skipping."
            else
              echo "Assigning Cosmos DB Built-in Data Contributor role..."
              az cosmosdb sql role assignment create \
                --account-name mymedia-cosmos \
                --resource-group rg-mymedia-prod \
                --role-definition-id "00000000-0000-0000-0000-000000000002" \
                --principal-id "$SP_OBJECT_ID" \
                --scope "/subscriptions/b2fba6de-c97e-42f2-b4f4-86cfa84a6de0/resourceGroups/rg-mymedia-prod/providers/Microsoft.DocumentDB/databaseAccounts/mymedia-cosmos"
              echo "Role assigned. Waiting 30s for propagation..."
              sleep 30
            fi

      - name: Run production setup script
        run: npx tsx scripts/setup-prod.ts
        env:
          # AzureCLICredential (part of DefaultAzureCredential) picks up the
          # az login session established by azure/login above.
          AZURE_CLOUD: AzureUSGovernment
